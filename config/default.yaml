# CloudGuessr Default Parameters (ROS 2 params file)
#
# - This file is loaded by `launch/cloudguessr.launch.py`.
# - Dataset paths (`map_file`, `rounds_dir`) are set by launch arguments:
#     - map_vis  -> map_server.map_file
#     - map_score -> round_manager.map_file
#     - rounds_dir -> round_manager.rounds_dir
#
# If you change this file in `src/cloudguessr/config`, run `colcon build` again
# (unless you are using `--symlink-install`).

map_server:
  ros__parameters:
    map_frame: map
    voxel_size: 0.0
    publish_rate: 0.5

round_manager:
  ros__parameters:
    map_frame: map

    # ROI / preprocess
    roi_radius: 20.0
    voxel_size: 0.5

    # ICP
    icp_max_iter: 50
    icp_max_corr_dist: 2.0
    yaw_candidates_deg: [0, 45, 90, 135, 180, 225, 270, 315]

    # FAIL thresholds
    fail_min_fitness: 0.3
    fail_max_rmse: 2.0
    use_xy_distance: true

    # UX / control
    click_debounce_ms: 300
    auto_advance: false
    result_display_sec: 5.0

    # Game score model
    score_perfect_radius_m: 1.5
    score_distance_decay_m: 55.0
    score_distance_exp: 0.9
    score_distance_weight: 0.82
    score_quality_weight: 0.18
    score_saturation_threshold: 0.975

